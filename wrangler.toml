name = "genba-mvp"
main = "worker/index.js"
compatibility_date = "2025-06-01"

# ビルド済みフロントエンドを静的配信 (SPA)
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "genba-mvp"
database_id = "8e00cc85-fdd8-46dc-a421-98aa8cc5004d"

[vars]
STRIPE_PRICE_SUBSCRIPTION = ""
STRIPE_PRICE_CREDITS_10 = ""
STRIPE_PRICE_CREDITS_50 = ""
STRIPE_PRICE_CREDITS_100 = ""
SITE_ADMIN_EMAILS = "ytaka122@ezweb.ne.jp"

# AI提案を使う場合(任意):
#   npx wrangler secret put ANTHROPIC_API_KEY
# 未設定の場合はルールベース提案に自動フォールバックします